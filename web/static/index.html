<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅人手帐 — 智能旅行助手</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai:wght@300;400;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f0e8;
  --bg-deep: #ece5d8;
  --text: #1a1a1a;
  --text-muted: #7a7265;
  --text-faint: #a69e93;
  --primary: #1a6b5a;
  --primary-light: #e8f4f0;
  --primary-dark: #0f4a3d;
  --accent: #b85c38;
  --accent-light: #f8ece6;
  --sage: #4a7c59;
  --ink: #0f1923;
  --paper: #faf7f2;
  --paper-shadow: rgba(26, 26, 26, 0.06);
  --ticket-border: #c9bfb0;
  --font-zh: 'LXGW WenKai', 'Noto Serif SC', 'Songti SC', serif;
  --font-en: 'Playfair Display', 'Georgia', serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Menlo', monospace;
  --radius: 6px;
  --radius-lg: 12px;
}

body {
  font-family: var(--font-zh);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* Grain texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.03;
  pointer-events: none;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ═══ Header ═══ */
.header {
  position: relative;
  background: var(--ink);
  color: #e8e2d8;
  padding: 28px 32px 24px;
  flex-shrink: 0;
  overflow: hidden;
}

/* Ink wash gradient */
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 80% at 20% 100%, rgba(26, 107, 90, 0.4), transparent),
    radial-gradient(ellipse 80% 60% at 80% 0%, rgba(184, 92, 56, 0.15), transparent);
  pointer-events: none;
}

/* Mountain silhouette */
.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 40px;
  background: var(--bg);
  clip-path: polygon(
    0% 100%, 0% 60%, 3% 55%, 7% 40%, 11% 50%, 15% 30%, 19% 45%,
    22% 25%, 25% 35%, 28% 15%, 31% 30%, 34% 20%, 37% 35%,
    40% 10%, 43% 25%, 46% 18%, 49% 30%, 52% 5%, 55% 20%,
    58% 15%, 61% 28%, 64% 12%, 67% 22%, 70% 8%, 73% 18%,
    76% 25%, 79% 15%, 82% 30%, 85% 20%, 88% 35%, 91% 25%,
    94% 40%, 97% 35%, 100% 50%, 100% 100%
  );
  pointer-events: none;
}

.header-content {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}

.header-left h1 {
  font-family: var(--font-zh);
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #f0ebe3;
}

.header-left h1 span {
  font-family: var(--font-en);
  font-style: italic;
  font-size: 13px;
  font-weight: 400;
  opacity: 0.5;
  margin-left: 12px;
  letter-spacing: 1px;
}

.header-left .subtitle {
  font-size: 12px;
  color: rgba(232, 226, 216, 0.45);
  margin-top: 6px;
  letter-spacing: 1px;
}

#resetBtn {
  background: transparent;
  color: rgba(232, 226, 216, 0.5);
  border: 1px solid rgba(232, 226, 216, 0.15);
  padding: 6px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-zh);
  font-size: 12px;
  transition: all 0.25s;
  letter-spacing: 1px;
}

#resetBtn:hover {
  color: rgba(232, 226, 216, 0.9);
  border-color: rgba(232, 226, 216, 0.35);
  background: rgba(232, 226, 216, 0.06);
}

/* ═══ Chat Area ═══ */
#chatArea {
  flex: 1;
  overflow-y: auto;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}

/* Custom scrollbar */
#chatArea::-webkit-scrollbar { width: 5px; }
#chatArea::-webkit-scrollbar-track { background: transparent; }
#chatArea::-webkit-scrollbar-thumb { background: var(--ticket-border); border-radius: 10px; }

/* ═══ Messages ═══ */
.msg {
  max-width: 72%;
  padding: 14px 18px;
  font-size: 14.5px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  background: var(--primary);
  color: #f0ebe3;
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius) var(--radius-lg);
  box-shadow: 0 2px 12px rgba(26, 107, 90, 0.15);
}

.msg.assistant {
  align-self: flex-start;
  background: var(--paper);
  color: var(--text);
  border-radius: var(--radius-lg) var(--radius-lg) var(--radius-lg) var(--radius);
  border-left: 3px solid var(--primary);
  box-shadow: 0 1px 8px var(--paper-shadow);
  position: relative;
}

.msg.assistant::before {
  content: '旅';
  position: absolute;
  top: -8px;
  left: -14px;
  font-size: 10px;
  color: var(--primary);
  background: var(--bg);
  padding: 1px 3px;
  border-radius: 3px;
  font-weight: 700;
  opacity: 0.6;
}

/* ═══ Streaming cursor ═══ */
.cursor {
  display: inline-block;
  width: 2px;
  height: 15px;
  background: var(--primary);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.8s ease infinite;
}

@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* ═══ Tool Group ═══ */
.tool-group {
  align-self: flex-start;
  max-width: 88%;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Processing status */
.tool-status {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--paper);
  border: 1px dashed var(--ticket-border);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--text-muted);
}

.tool-status-dot {
  width: 6px;
  height: 6px;
  background: var(--primary);
  border-radius: 50%;
  animation: pulse 1.4s ease infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* Tool summary (collapsed) */
.tool-summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--bg-deep);
  border: 1px dashed var(--ticket-border);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--text-faint);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.tool-summary:hover {
  background: var(--paper);
  color: var(--text-muted);
}

.tool-summary .arrow {
  font-size: 10px;
  transition: transform 0.25s;
  color: var(--text-faint);
}

.tool-summary .arrow.open {
  transform: rotate(90deg);
}

/* Tool detail (expanded) */
.tool-detail {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Ticket-style tool step */
.tool-step {
  background: var(--paper);
  border: 1px solid var(--ticket-border);
  border-radius: var(--radius);
  overflow: hidden;
  position: relative;
}

/* Perforated edge effect */
.tool-step::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    var(--primary) 0px,
    var(--primary) 3px,
    transparent 3px,
    transparent 8px
  );
  opacity: 0.4;
}

.tool-step-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px 8px 18px;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--ticket-border);
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 1px;
}

.tool-step-header .step-num {
  font-family: var(--font-en);
  font-size: 11px;
  color: var(--text-faint);
}

.tool-step-body {
  padding: 12px 16px 12px 20px;
  font-size: 13px;
  line-height: 1.7;
}

.tool-section {
  margin-bottom: 12px;
}

.tool-section:last-child {
  margin-bottom: 0;
}

.tool-label {
  font-weight: 700;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tool-label::before {
  content: '';
  width: 12px;
  height: 1px;
  background: currentColor;
  opacity: 0.4;
}

.tool-label.thought { color: var(--primary); }
.tool-label.action { color: var(--accent); }
.tool-label.observation { color: var(--sage); }

.tool-section pre {
  background: var(--bg);
  padding: 10px 12px;
  border-radius: 4px;
  font-family: var(--font-zh);
  font-size: 12.5px;
  line-height: 1.7;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  margin: 0;
  border: 1px solid rgba(0,0,0,0.04);
}

/* ═══ Loading ═══ */
.loading {
  align-self: flex-start;
  padding: 14px 20px;
  background: var(--paper);
  border: 1px dashed var(--ticket-border);
  border-radius: var(--radius);
  display: flex;
  gap: 6px;
  align-items: center;
}

.loading span {
  width: 5px;
  height: 5px;
  background: var(--primary);
  border-radius: 50%;
  animation: loadBounce 1.4s ease infinite;
}

.loading span:nth-child(2) { animation-delay: 0.16s; }
.loading span:nth-child(3) { animation-delay: 0.32s; }

@keyframes loadBounce {
  0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* ═══ Welcome message ═══ */
.welcome {
  align-self: center;
  text-align: center;
  padding: 48px 24px 24px;
  animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.welcome-icon {
  font-size: 48px;
  margin-bottom: 16px;
  filter: grayscale(0.2);
}

.welcome h2 {
  font-family: var(--font-zh);
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.welcome p {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.8;
  max-width: 360px;
  margin: 0 auto;
}

.welcome .cities {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.welcome .city-tag {
  font-size: 12px;
  padding: 4px 12px;
  background: var(--paper);
  border: 1px solid var(--ticket-border);
  border-radius: 20px;
  color: var(--text-muted);
  cursor: default;
  transition: all 0.2s;
}

.welcome .city-tag:hover {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--primary-light);
}

/* ═══ Input Bar ═══ */
.input-bar {
  padding: 16px 24px 20px;
  background: var(--paper);
  border-top: 1px solid rgba(0,0,0,0.06);
  display: flex;
  gap: 12px;
  flex-shrink: 0;
  position: relative;
}

.input-bar::before {
  content: '';
  position: absolute;
  top: -20px;
  left: 0;
  right: 0;
  height: 20px;
  background: linear-gradient(to top, var(--bg), transparent);
  pointer-events: none;
}

#userInput {
  flex: 1;
  padding: 12px 18px;
  border: 1px solid var(--ticket-border);
  border-radius: var(--radius);
  font-family: var(--font-zh);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: all 0.25s;
}

#userInput:focus {
  border-color: var(--primary);
  background: var(--paper);
  box-shadow: 0 0 0 3px rgba(26, 107, 90, 0.08);
}

#userInput::placeholder {
  color: var(--text-faint);
  font-size: 13px;
}

#sendBtn {
  background: var(--primary);
  color: #f0ebe3;
  border: none;
  padding: 12px 28px;
  border-radius: var(--radius);
  font-family: var(--font-zh);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 2px;
  transition: all 0.25s;
}

#sendBtn:hover {
  background: var(--primary-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(26, 107, 90, 0.2);
}

#sendBtn:active {
  transform: translateY(0);
}

#sendBtn:disabled {
  background: var(--ticket-border);
  color: var(--text-faint);
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* ═══ Transitions ═══ */
.tool-group-enter-active { animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

/* ═══ Responsive ═══ */
@media (max-width: 640px) {
  .header { padding: 20px 16px 18px; }
  .header-left h1 { font-size: 20px; letter-spacing: 2px; }
  .header-left h1 span { display: none; }
  #chatArea { padding: 20px 14px; gap: 16px; }
  .msg { max-width: 88%; font-size: 14px; }
  .tool-group { max-width: 95%; }
  .input-bar { padding: 12px 14px 16px; }
  #sendBtn { padding: 12px 20px; letter-spacing: 1px; }
  .welcome { padding: 32px 16px 16px; }
}
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-content">
      <div class="header-left">
        <h1>旅人手帐 <span>Travel Journal</span></h1>
        <div class="subtitle">上海 · 北京 · 广州 · 深圳 · 南京 · 杭州 · 成都 · 重庆 · 武汉 · 西安 · 芜湖</div>
      </div>
      <button id="resetBtn" @click="resetChat">清空对话</button>
    </div>
  </div>

  <div id="chatArea" ref="chatArea">
    <!-- Welcome -->
    <div v-if="showWelcome" class="welcome">
      <div class="welcome-icon">🏔️</div>
      <h2>你好，旅行者</h2>
      <p>我可以帮你查询天气、推荐景点、规划路线、<br>估算预算，定制专属行程。</p>
      <div class="cities">
        <span class="city-tag" v-for="c in cities" :key="c">{{ c }}</span>
      </div>
    </div>

    <template v-for="(msg, idx) in messages" :key="idx">
      <!-- User message -->
      <div v-if="msg.role === 'user'" class="msg user">{{ msg.content }}</div>

      <!-- Tool call group -->
      <template v-else-if="msg.role === 'tool-group'">
        <div class="tool-group" v-if="!msg.done">
          <div class="tool-status">
            <span class="tool-status-dot"></span>
            <span>{{ getToolStatusText(msg) }}</span>
          </div>
        </div>
        <div class="tool-group" v-else>
          <div class="tool-summary" @click="msg.showDetail = !msg.showDetail">
            <span>已查询 {{ msg.steps.length }} 个工具</span>
            <span class="arrow" :class="{ open: msg.showDetail }">▸</span>
          </div>
          <div class="tool-detail" v-if="msg.showDetail">
            <div class="tool-step" v-for="(step, si) in msg.steps" :key="si">
              <div class="tool-step-header">
                <span>{{ getToolDisplayName(step) }}</span>
                <span class="step-num">#{{ si + 1 }}</span>
              </div>
              <div class="tool-step-body">
                <div class="tool-section" v-if="step.thought">
                  <div class="tool-label thought">思考</div>
                  <pre>{{ step.thought }}</pre>
                </div>
                <div class="tool-section" v-if="step.action">
                  <div class="tool-label action">调用</div>
                  <pre>{{ step.action }}</pre>
                </div>
                <div class="tool-section" v-if="step.observation">
                  <div class="tool-label observation">结果</div>
                  <pre>{{ step.observation }}</pre>
                </div>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Assistant answer -->
      <div v-else-if="msg.role === 'assistant'" class="msg assistant">{{ msg.content }}</div>
    </template>

    <!-- Streaming display -->
    <div v-if="streamText" class="msg assistant">
      <span>{{ streamText }}</span>
      <span class="cursor"></span>
    </div>

    <!-- Loading -->
    <div v-if="isProcessing && !streamText && !hasToolGroup" class="loading">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="input-bar">
    <input
      id="userInput"
      v-model="userInput"
      @keydown.enter.exact="sendMessage"
      placeholder="输入你的旅行问题..."
      autocomplete="off"
    />
    <button id="sendBtn" :disabled="isProcessing" @click="sendMessage">出发</button>
  </div>
</div>

<script>
const { createApp, ref, computed, watch, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const messages = ref([]);
    const userInput = ref('');
    const isProcessing = ref(false);
    const chatArea = ref(null);
    const streamText = ref('');
    const showWelcome = ref(true);
    const cities = ['上海', '北京', '广州', '深圳', '南京', '杭州', '成都', '重庆', '武汉', '西安', '芜湖'];

    let streamTimer = null;

    const hasToolGroup = computed(() => {
      return messages.value.some(m => m.role === 'tool-group' && !m.done);
    });

    function scrollToBottom() {
      nextTick(() => {
        if (chatArea.value) {
          chatArea.value.scrollTo({
            top: chatArea.value.scrollHeight,
            behavior: 'smooth'
          });
        }
      });
    }

    function scrollToBottomInstant() {
      nextTick(() => {
        if (chatArea.value) {
          chatArea.value.scrollTop = chatArea.value.scrollHeight;
        }
      });
    }

    // Typewriter streaming effect
    function streamAnswer(fullText) {
      return new Promise((resolve) => {
        streamText.value = '';
        let idx = 0;
        const speed = 25;
        function tick() {
          if (idx < fullText.length) {
            streamText.value += fullText[idx];
            idx++;
            scrollToBottomInstant();
            streamTimer = setTimeout(tick, speed);
          } else {
            streamTimer = null;
            streamText.value = '';
            messages.value.push({ role: 'assistant', content: fullText });
            scrollToBottom();
            resolve();
          }
        }
        tick();
      });
    }

    const nameMap = {
      get_current_date: '日期',
      get_weather_forecast: '天气预报',
      get_weather: '天气',
      check_holiday: '节假日',
      get_attraction: '景点',
      get_restaurant: '美食',
      get_hotel: '住宿',
      estimate_budget: '预算',
      get_transport: '交通',
      show_map: '地图',
      get_route: '路线',
    };

    function getToolDisplayName(step) {
      if (step.action) {
        const m = step.action.match(/^(\w+)\(/);
        if (m) return nameMap[m[1]] || m[1];
      }
      return '查询中';
    }

    function getToolStatusText(msg) {
      if (msg.steps.length === 0) return '正在思考...';
      const lastStep = msg.steps[msg.steps.length - 1];
      const name = getToolDisplayName(lastStep);
      return `正在查询${name}...`;
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isProcessing.value) return;

      showWelcome.value = false;
      isProcessing.value = true;
      userInput.value = '';
      messages.value.push({ role: 'user', content: text });
      scrollToBottom();

      let toolGroup = null;
      let gotAnswer = false;
      let answerContent = '';

      try {
        const resp = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const event = JSON.parse(line.slice(6));

              if (event.type === 'status') {
                if (toolGroup) toolGroup.done = true;
                toolGroup = { role: 'tool-group', done: false, showDetail: false, steps: [] };
                messages.value.push(toolGroup);
                scrollToBottom();
              } else if (event.type === 'token') {
                // Ignore raw tokens — we use structured events
              } else if (event.type === 'thought') {
                if (toolGroup) {
                  let step = toolGroup.steps.find(s => s.step === event.step);
                  if (!step) {
                    step = { step: event.step, thought: '', action: '', observation: '' };
                    toolGroup.steps.push(step);
                  }
                  step.thought = event.content;
                }
              } else if (event.type === 'action') {
                if (toolGroup) {
                  let step = toolGroup.steps.find(s => s.step === event.step);
                  if (!step) {
                    step = { step: event.step, thought: '', action: '', observation: '' };
                    toolGroup.steps.push(step);
                  }
                  step.action = event.content;
                }
              } else if (event.type === 'observation') {
                if (toolGroup) {
                  let step = toolGroup.steps.find(s => s.step === event.step);
                  if (!step) {
                    step = { step: event.step, thought: '', action: '', observation: '' };
                    toolGroup.steps.push(step);
                  }
                  step.observation = event.content;
                }
                scrollToBottom();
              } else if (event.type === 'answer') {
                gotAnswer = true;
                answerContent = event.content;
                if (toolGroup) toolGroup.done = true;
              } else if (event.type === 'error') {
                gotAnswer = true;
                answerContent = `错误：${event.content}`;
                if (toolGroup) toolGroup.done = true;
              }
            } catch (e) {
              // Ignore parse errors
            }
          }
        }

        if (gotAnswer && answerContent) {
          await streamAnswer(answerContent);
        } else if (!gotAnswer) {
          messages.value.push({ role: 'assistant', content: '未收到有效响应，请重试。' });
        }
      } catch (err) {
        messages.value.push({ role: 'assistant', content: `请求失败：${err.message}` });
      } finally {
        isProcessing.value = false;
        nextTick(() => document.getElementById('userInput').focus());
      }
    }

    async function resetChat() {
      if (streamTimer) { clearTimeout(streamTimer); streamTimer = null; }
      streamText.value = '';
      await fetch('/api/reset', { method: 'POST' });
      messages.value = [];
      showWelcome.value = true;
    }

    onMounted(() => {
      nextTick(() => document.getElementById('userInput').focus());
    });

    return {
      messages, userInput, isProcessing, chatArea,
      streamText, showWelcome, cities, hasToolGroup,
      sendMessage, resetChat, getToolDisplayName, getToolStatusText
    };
  }
}).mount('#app');
</script>
</body>
</html>
